  kafka-ui:
    # Browser UI for checking topics, messages, consumer groups, and connector state.
    image: provectuslabs/kafka-ui:latest
    container_name: kafka-ui
    depends_on:
      - broker
    #  - connect
    ports:
      - "8090:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: towerhealth
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: broker:29092
     # KAFKA_CLUSTERS_0_KAFKACONNECT_0_NAME: connect
      #KAFKA_CLUSTERS_0_KAFKACONNECT_0_ADDRESS: http://connect:8083
    networks:
      - towerhealth
    restart: unless-stopped

  postgres:
    # Stores the rows Spark consumes from Kafka so the dashboard can query them.
    image: postgres:16-alpine
    container_name: postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-towerhealth}
      POSTGRES_USER: ${POSTGRES_USER:-towerhealth}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-towerhealth}
    volumes:
      - pg_data:/var/lib/postgresql/data
      - ./services/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    networks:
      - towerhealth
    restart: unless-stopped

  spark-master:
    # Spark cluster coordinator. The streaming job submits to this master URL.
    image: apache/spark:3.5.1
    container_name: spark-master
    command:
      - /opt/spark/bin/spark-class
      - org.apache.spark.deploy.master.Master
      - --host
      - spark-master
    ports:
      - "7077:7077"
      - "8084:8080"
    networks:
      - towerhealth
    restart: unless-stopped

  spark-worker:
    # Spark executor node that runs the work assigned by spark-master.
    image: apache/spark:3.5.1
    container_name: spark-worker
    depends_on:
      - spark-master
    command:
      - /opt/spark/bin/spark-class
      - org.apache.spark.deploy.worker.Worker
      - spark://spark-master:7077
    networks:
      - towerhealth
    restart: unless-stopped

  spark-stream:
    # Structured Streaming job: Kafka topics -> kafka_events table in Postgres.
    image: apache/spark:3.5.1
    container_name: spark-stream
    user: root
    depends_on:
      - broker
      - postgres
      - spark-master
      - spark-worker
    environment:
      KAFKA_BOOTSTRAP_SERVERS: ${KAFKA_BOOTSTRAP_SERVERS:-broker:29092}
      KAFKA_TOPICS: ${SPARK_KAFKA_TOPICS:-ran_telemetry,weather_events}
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: ${POSTGRES_DB:-towerhealth}
      POSTGRES_USER: ${POSTGRES_USER:-towerhealth}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-towerhealth}
      SPARK_CHECKPOINT_DIR: /tmp/towerhealth-checkpoints
      HOME: /tmp
    volumes:
      - ./services/spark_streaming:/opt/towerhealth/spark_streaming:ro
      - spark_checkpoints:/tmp/towerhealth-checkpoints
      - spark_ivy:/tmp/.ivy2
    command:
      - /bin/sh
      - -c
      - |
        mkdir -p /tmp/.ivy2/cache /tmp/.ivy2/jars
        /opt/spark/bin/spark-submit \
          --master spark://spark-master:7077 \
          --conf spark.jars.ivy=/tmp/.ivy2 \
          --packages org.apache.spark:spark-sql-kafka-0-10_2.12:3.5.0,org.postgresql:postgresql:42.7.4 \
          /opt/towerhealth/spark_streaming/stream_kafka_to_postgres.py
    networks:
      - towerhealth
    restart: unless-stopped

  spark-weather:
    # نسخة طبق الأصل من إعدادات spark-stream لضمان التوافق
    image: apache/spark:3.5.1
    container_name: spark-weather
    user: root
    depends_on:
      - broker
      - postgres
      - spark-master
      - spark-worker
    environment:
      KAFKA_BOOTSTRAP_SERVERS: ${KAFKA_BOOTSTRAP_SERVERS:-broker:29092}
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: ${POSTGRES_DB:-towerhealth}
      POSTGRES_USER: ${POSTGRES_USER:-towerhealth}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-towerhealth}
      # مسار checkpoint مختلف عشان ميتخانقوش مع بعض
      SPARK_CHECKPOINT_DIR: /tmp/towerhealth-checkpoints-weather
      HOME: /tmp
    volumes:
      - ./services/spark_streaming:/opt/towerhealth/spark_streaming:ro
      - spark_checkpoints:/tmp/towerhealth-checkpoints-weather
      - spark_ivy:/tmp/.ivy2
    command:
      - /bin/sh
      - -c
      - |
        mkdir -p /tmp/.ivy2/cache /tmp/.ivy2/jars
        /opt/spark/bin/spark-submit \
          --master spark://spark-master:7077 \
          --conf spark.jars.ivy=/tmp/.ivy2 \
          --packages org.apache.spark:spark-sql-kafka-0-10_2.12:3.5.0,org.postgresql:postgresql:42.7.4 \
          /opt/towerhealth/spark_streaming/stream_weather_to_postgres.py
    networks:
      - towerhealth
    restart: unless-stopped
    
  streamlit:
    # Simple realtime dashboard that reads the kafka_events table from Postgres.
    image: python:3.11-slim
    container_name: streamlit
    depends_on:
      - postgres
    ports:
      - "8501:8501"
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: ${POSTGRES_DB:-towerhealth}
      POSTGRES_USER: ${POSTGRES_USER:-towerhealth}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-towerhealth}
    volumes:
      - ./services/streamlit_dashboard:/app:ro
    working_dir: /app
    command:
      - sh
      - -c
      - |
        pip install --no-cache-dir -r requirements.txt
        streamlit run app.py --server.port=8501 --server.address=0.0.0.0
    networks:
      - towerhealth
    restart: unless-stopped

  ran-generator:
    # Synthetic RAN telemetry source. In kafka mode it writes to ran_telemetry.
    build:
      context: ./services/ran_generator
    container_name: ran-generator
    depends_on:
      - broker
    environment:
      OUTPUT_MODE: ${RAN_OUTPUT_MODE:-stdout}
      RAN_INTERVAL_SECONDS: ${RAN_INTERVAL_SECONDS:-30}
      KAFKA_BOOTSTRAP_SERVERS: ${KAFKA_BOOTSTRAP_SERVERS:-broker:29092}
      KAFKA_TOPIC: ${RAN_KAFKA_TOPIC:-ran_telemetry}
    volumes:
      - ran_data:/data
    networks:
      - towerhealth
    restart: unless-stopped

  weather-producer:
    # WeatherAPI source. In kafka mode it writes weather snapshots to weather_events.
    build:
      context: ./services/weather_producer
    container_name: weather-producer
    depends_on:
      - broker
    environment:
      OUTPUT_MODE: ${WEATHER_OUTPUT_MODE:-stdout}
      WEATHERAPI_KEY: ${WEATHERAPI_KEY}
      WEATHER_LOCATIONS: ${WEATHER_LOCATIONS:-}
      WEATHER_LOCATION: ${WEATHER_LOCATION:-}
      WEATHER_LAT: ${WEATHER_LAT:-}
      WEATHER_LON: ${WEATHER_LON:-}
      KAFKA_BOOTSTRAP_SERVERS: ${KAFKA_BOOTSTRAP_SERVERS:-broker:29092}
      KAFKA_TOPIC: ${WEATHER_KAFKA_TOPIC:-weather_events}
      WEATHER_POLL_SECONDS: ${WEATHER_POLL_SECONDS:-900}
    networks:
      - towerhealth
    restart: unless-stopped

volumes:
  pg_data:
  ran_data:
  spark_checkpoints:
  spark_ivy:

networks:
  towerhealth:
    name: towerhealth
    driver: bridge
